<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Absensi Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 via-gray-100 to-gray-200">
  
  <!-- Login Page -->
  <div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <div class="glass shadow-xl rounded-3xl p-8 border border-white/50">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-bold text-gray-700 mb-2">ADMIN LOGIN</h1>
          <p class="text-gray-400 text-sm">Absensi Online</p>
        </div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-600 mb-2">Username</label>
            <input 
              type="text" 
              id="username"
              class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-gray-400 transition-all"
              placeholder="Masukkan username"
            >
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-600 mb-2">Password</label>
            <input 
              type="password" 
              id="password"
              class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-gray-400 transition-all"
              placeholder="Masukkan password"
            >
          </div>

          <div id="loginError" class="text-red-500 text-sm hidden"></div>

          <button 
            type="submit"
            class="w-full py-3 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-xl transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]"
          >
            LOGIN
          </button>
        </form>

        <div class="text-center mt-6">
          <a href="index.html" class="text-gray-400 text-sm hover:text-gray-500">
            ← Kembali ke Absensi
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Dashboard Page -->
  <div id="dashboardPage" class="hidden">
    <!-- Sidebar -->
    <div class="fixed left-0 top-0 h-full w-64 bg-white shadow-lg z-50">
      <div class="p-6">
        <h2 class="text-xl font-bold text-gray-700 mb-8">ADMIN</h2>
        
        <nav class="space-y-2">
          <button 
            data-page="dashboard"
            class="nav-btn w-full text-left px-4 py-3 rounded-xl transition-all duration-200 bg-gray-100 text-gray-700 font-medium"
          >
            Dashboard
          </button>
          <button 
            data-page="participants"
            class="nav-btn w-full text-left px-4 py-3 rounded-xl transition-all duration-200 text-gray-500 hover:bg-gray-50"
          >
            Peserta
          </button>
          <button 
            data-page="attendance"
            class="nav-btn w-full text-left px-4 py-3 rounded-xl transition-all duration-200 text-gray-500 hover:bg-gray-50"
          >
            Rekap Absensi
          </button>
        </nav>
      </div>

      <div class="absolute bottom-0 left-0 right-0 p-6">
        <button 
          id="logoutBtn"
          class="w-full py-3 border-2 border-gray-200 text-gray-500 rounded-xl hover:border-gray-300 hover:text-gray-600 transition-all"
        >
          Logout
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="ml-64 p-8">
      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page-content">
        <h1 class="text-2xl font-bold text-gray-700 mb-6">Dashboard</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
          <div class="bg-white rounded-2xl p-6 shadow-lg">
            <p class="text-gray-400 text-sm mb-1">Total Peserta</p>
            <p class="text-3xl font-bold text-gray-700" id="totalParticipants">0</p>
          </div>
          <div class="bg-white rounded-2xl p-6 shadow-lg">
            <p class="text-gray-400 text-sm mb-1">Hadir Hari Ini</p>
            <p class="text-3xl font-bold text-green-600" id="todayAttendance">0</p>
          </div>
          <div class="bg-white rounded-2xl p-6 shadow-lg">
            <p class="text-gray-400 text-sm mb-1">Belum Absen</p>
            <p class="text-3xl font-bold text-gray-600" id="notAttended">0</p>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-lg">
          <h2 class="text-lg font-semibold text-gray-700 mb-4">Rekap Hari Ini</h2>
          <div id="todayList" class="space-y-3">
            <p class="text-gray-400 text-center py-4">Memuat data...</p>
          </div>
        </div>
      </div>

      <!-- Participants Page -->
      <div id="page-participants" class="page-content hidden">
        <div class="flex justify-between items-center mb-6">
          <h1 class="text-2xl font-bold text-gray-700">Data Peserta</h1>
          <button 
            id="addParticipantBtn"
            class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-xl transition-all hover:scale-105"
          >
            + Tambah Peserta
          </button>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">No</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Nomor Absen</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Nama</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Aksi</th>
              </tr>
            </thead>
            <tbody id="participantsTable" class="divide-y divide-gray-100">
              <tr>
                <td colspan="4" class="px-6 py-8 text-center text-gray-400">Memuat data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Attendance Page -->
      <div id="page-attendance" class="page-content hidden">
        <h1 class="text-2xl font-bold text-gray-700 mb-6">Rekap Absensi</h1>

        <div class="flex gap-4 mb-6">
          <input 
            type="date" 
            id="attendanceDate"
            class="px-4 py-3 bg-white border-2 border-gray-200 rounded-xl focus:outline-none focus:border-gray-400"
          >
          <button 
            id="filterAttendanceBtn"
            class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-xl transition-all hover:scale-105"
          >
            Filter
          </button>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">No</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Nomor Absen</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Nama</th>
                <th class="px-6 py-4 text-left text-sm font-semibold text-gray-600">Jam</th>
              </tr>
            </thead>
            <tbody id="attendanceTable" class="divide-y divide-gray-100">
              <tr>
                <td colspan="4" class="px-6 py-8 text-center text-gray-400">Memuat data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Participant Modal -->
  <div id="addModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md mx-4 shadow-2xl">
      <h2 class="text-xl font-bold text-gray-700 mb-6">Tambah Peserta Baru</h2>
      
      <form id="addParticipantForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-2">Nomor Absen</label>
          <input 
            type="text" 
            id="newNomorAbsen"
            class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-gray-400"
            placeholder="Contoh: ABS001"
          >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-600 mb-2">Nama Lengkap</label>
          <input 
            type="text" 
            id="newNama"
            class="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-gray-400"
            placeholder="Contoh: John Doe"
          >
        </div>

        <div id="addError" class="text-red-500 text-sm hidden"></div>

        <div class="flex gap-3 mt-6">
          <button 
            type="button"
            id="cancelAddBtn"
            class="flex-1 py-3 border-2 border-gray-200 text-gray-500 rounded-xl hover:border-gray-300 transition-all"
          >
            Batal
          </button>
          <button 
            type="submit"
            class="flex-1 py-3 bg-gray-600 hover:bg-gray-700 text-white font-medium rounded-xl transition-all"
          >
            Simpan
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
      ? 'http://localhost:3000/api' 
      : 'https://absensi-backend.onrender.com/api';

    let authToken = localStorage.getItem('adminToken');

    // DOM Elements
    const loginPage = document.getElementById('loginPage');
    const dashboardPage = document.getElementById('dashboardPage');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const addModal = document.getElementById('addModal');
    const addParticipantForm = document.getElementById('addParticipantForm');
    const navBtns = document.querySelectorAll('.nav-btn');
    const pageContents = document.querySelectorAll('.page-content');

    // Check auth
    if (authToken) {
      showDashboard();
    }

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(`${API_BASE}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (result.success) {
          authToken = result.token;
          localStorage.setItem('adminToken', result.token);
          showDashboard();
        } else {
          loginError.textContent = result.error;
          loginError.classList.remove('hidden');
        }
      } catch (error) {
        loginError.textContent = 'Tidak dapat terhubung ke server';
        loginError.classList.remove('hidden');
      }
    });

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('adminToken');
      authToken = null;
      loginPage.classList.remove('hidden');
      dashboardPage.classList.add('hidden');
    });

    // Show dashboard
    function showDashboard() {
      loginPage.classList.add('hidden');
      dashboardPage.classList.remove('hidden');
      loadDashboard();
    }

    // Navigation
    navBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const page = btn.dataset.page;
        
        navBtns.forEach(b => {
          b.classList.remove('bg-gray-100', 'text-gray-700', 'font-medium');
          b.classList.add('text-gray-500');
        });
        btn.classList.add('bg-gray-100', 'text-gray-700', 'font-medium');
        btn.classList.remove('text-gray-500');

        pageContents.forEach(content => {
          content.classList.add('hidden');
        });
        document.getElementById(`page-${page}`).classList.remove('hidden');

        if (page === 'dashboard') loadDashboard();
        if (page === 'participants') loadParticipants();
        if (page === 'attendance') loadAttendance();
      });
    });

    // Load dashboard data
    async function loadDashboard() {
      try {
        const response = await fetch(`${API_BASE}/admin/stats/today`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const result = await response.json();
        
        if (result.success) {
          document.getElementById('totalParticipants').textContent = result.data.total;
          document.getElementById('todayAttendance').textContent = result.data.hadir;
          document.getElementById('notAttended').textContent = result.data.total - result.data.hadir;
        }
        
        loadTodayList();
      } catch (error) {
        console.error('Error:', error);
      }
    }

    // Load today's attendance list
    async function loadTodayList() {
      const today = new Date().toISOString().split('T')[0];
      
      try {
        const response = await fetch(`${API_BASE}/admin/attendance?date=${today}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const result = await response.json();
        
        const listContainer = document.getElementById('todayList');
        
        if (result.success && result.data.length > 0) {
          listContainer.innerHTML = result.data.map(item => `
            <div class="flex items-center justify-between py-3 px-4 bg-gray-50 rounded-xl">
              <div class="flex items-center gap-4">
                <span class="font-semibold text-gray-700">${item.nomor_absen}</span>
                <span class="text-gray-600">${item.nama}</span>
              </div>
              <span class="text-gray-400 text-sm">${item.jam}</span>
            </div>
          `).join('');
        } else {
          listContainer.innerHTML = '<p class="text-gray-400 text-center py-4">Belum ada yang absen hari ini</p>';
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    // Load participants
    async function loadParticipants() {
      try {
        const response = await fetch(`${API_BASE}/admin/participants`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const result = await response.json();
        
        const tableBody = document.getElementById('participantsTable');
        
        if (result.success) {
          tableBody.innerHTML = result.data.map((item, index) => `
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 text-gray-600">${index + 1}</td>
              <td class="px-6 py-4 font-semibold text-gray-700">${item.nomor_absen}</td>
              <td class="px-6 py-4 text-gray-600">${item.nama}</td>
              <td class="px-6 py-4">
                <button 
                  onclick="deleteParticipant('${item.id}')"
                  class="text-red-500 hover:text-red-700 transition-colors"
                >
                  Hapus
                </button>
              </td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    // Delete participant
    window.deleteParticipant = async (id) => {
      if (!confirm('Apakah Anda yakin ingin menghapus peserta ini?')) return;
      
      try {
        const response = await fetch(`${API_BASE}/admin/participant/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        
        if (response.ok) {
          loadParticipants();
        }
      } catch (error) {
        console.error('Error:', error);
      }
    };

    // Load attendance
    async function loadAttendance() {
      const date = document.getElementById('attendanceDate').value || new Date().toISOString().split('T')[0];
      
      try {
        const response = await fetch(`${API_BASE}/admin/attendance?date=${date}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const result = await response.json();
        
        const tableBody = document.getElementById('attendanceTable');
        
        if (result.success) {
          tableBody.innerHTML = result.data.map((item, index) => `
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="px-6 py-4 text-gray-600">${index + 1}</td>
              <td class="px-6 py-4 font-semibold text-gray-700">${item.nomor_absen}</td>
              <td class="px-6 py-4 text-gray-600">${item.nama}</td>
              <td class="px-6 py-4 text-gray-500">${item.jam}</td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    // Add participant modal
    document.getElementById('addParticipantBtn').addEventListener('click', () => {
      addModal.classList.remove('hidden');
    });

    document.getElementById('cancelAddBtn').addEventListener('click', () => {
      addModal.classList.add('hidden');
    });

    addParticipantForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('addError');
      errorDiv.classList.add('hidden');

      const nomorAbsen = document.getElementById('newNomorAbsen').value.trim().toUpperCase();
      const nama = document.getElementById('newNama').value.trim();

      try {
        const response = await fetch(`${API_BASE}/admin/participant`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify({ nomor_absen: nomorAbsen, nama })
        });

        const result = await response.json();

        if (result.success) {
          addModal.classList.add('hidden');
          addParticipantForm.reset();
          loadParticipants();
        } else {
          errorDiv.textContent = result.error;
          errorDiv.classList.remove('hidden');
        }
      } catch (error) {
        errorDiv.textContent = 'Tidak dapat terhubung ke server';
        errorDiv.classList.remove('hidden');
      }
    });

    // Filter attendance
    document.getElementById('filterAttendanceBtn').addEventListener('click', loadAttendance);

    // Set default date
    document.getElementById('attendanceDate').value = new Date().toISOString().split('T')[0];
  </script>
</body>
</html>
